<div id="divDetalleVendedor" class="row mb-4">
    <div class="col-12">
        <div class="card card-custom">
            <div class="card-header card-header-custom d-flex align-items-center justify-content-between">
                <h5 class="mb-0"><i class="fa-solid fa-user-tie text-primary me-2"></i>Detalle de Vendedor</h5>
                <button class="btn btn-outline-danger btn-sm fw-bold" onclick="cm.cerrarDetalle();">
                    <i class="fa-solid fa-xmark"></i> Cerrar
                </button>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-2 col-12">
                        <div class="form-floating">
                            <input id="txtIdVendedor" type="text" class="form-control bg-light" placeholder="ID" readonly />
                            <label for="txtIdVendedor" class="fw-bold">ID:</label>
                        </div>
                    </div>
                    <div class="col-md-5 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtNombre" type="text" class="form-control" placeholder="Nombre completo"/>
                            <label for="txtNombre">Nombre completo:</label>
                        </div>
                    </div>
                    <div class="col-md-3 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtFechaNacimiento" type="date" class="form-control" placeholder="Fecha Nacimiento"/>
                            <label for="txtFechaNacimiento">Fecha Nacimiento:</label>
                        </div>
                    </div>
                    <div class="col-md-2 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <select id="cmbGenero" class="form-select">
                                <option value="M">Masculino</option>
                                <option value="F">Femenino</option>
                                <option value="O">Otro</option>
                            </select>
                            <label for="cmbGenero">Género:</label>
                        </div>
                    </div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-4 col-12">
                        <div class="form-floating">
                            <input id="txtCalle" type="text" class="form-control" placeholder="Calle"/>
                            <label for="txtCalle">Calle:</label>
                        </div>
                    </div>
                    <div class="col-md-2 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtNumeroExterior" type="text" class="form-control" placeholder="No. Ext"/>
                            <label for="txtNumeroExterior">No. Ext:</label>
                        </div>
                    </div>
                    <div class="col-md-2 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtNumeroInterior" type="text" class="form-control" placeholder="No. Int"/>
                            <label for="txtNumeroInterior">No. Int:</label>
                        </div>
                    </div>
                    <div class="col-md-4 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtColonia" type="text" class="form-control" placeholder="Colonia"/>
                            <label for="txtColonia">Colonia:</label>
                        </div>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-3 col-12">
                        <div class="form-floating">
                            <input id="txtCodigoPostal" type="text" class="form-control" placeholder="C.P."/>
                            <label for="txtCodigoPostal">C.P.:</label>
                        </div>
                    </div>
                    <div class="col-md-3 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtCiudad" type="text" class="form-control" placeholder="Ciudad"/>
                            <label for="txtCiudad">Ciudad:</label>
                        </div>
                    </div>
                    <div class="col-md-3 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtEstado" type="text" class="form-control" placeholder="Estado"/>
                            <label for="txtEstado">Estado:</label>
                        </div>
                    </div>
                    <div class="col-md-3 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtPais" type="text" class="form-control" placeholder="País"/>
                            <label for="txtPais">País:</label>
                        </div>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-3 col-12">
                        <div class="form-floating">
                            <input id="txtTelefono" type="text" class="form-control" placeholder="Teléfono"/>
                            <label for="txtTelefono">Teléfono:</label>
                        </div>
                    </div>
                    <div class="col-md-4 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtEmail" type="email" class="form-control" placeholder="Correo"/>
                            <label for="txtEmail">Correo Electrónico:</label>
                        </div>
                    </div>
                    <div class="col-md-3 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtFechaAlta" type="date" class="form-control" placeholder="Fecha Alta"/>
                            <label for="txtFechaAlta">Fecha de Alta:</label>
                        </div>
                    </div>
                    <div class="col-md-2 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtEstatus" type="number" class="form-control" placeholder="Estatus"/>
                            <label for="txtEstatus">Estatus (1 o 0):</label>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12 d-flex justify-content-center gap-2">
                        <button class="btn btn-primary px-4" onclick="cm.save();">
                            <i class="fa-solid fa-floppy-disk me-1"></i> Guardar
                        </button>
                        <button class="btn btn-danger px-4" onclick="cm.deletE();">
                            <i class="fa-solid fa-trash me-1"></i> Eliminar
                        </button>
                        <button class="btn btn-success px-4" onclick="cm.limpiarFormulario();">
                            <i class="fa-solid fa-file-circle-plus me-1"></i> Nuevo
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="divCatalogoVendedores" class="row">
    <div class="col-12">
        <div class="card card-custom">
            <div class="card-header card-header-custom d-flex align-items-center justify-content-between">
                <h5 class="mb-0"><i class="fa-solid fa-users text-primary me-2"></i>Catálogo de Vendedores</h5>
                <button class="btn btn-success btn-sm" onclick="cm.setDetalleVisible(true); cm.limpiarFormulario();">
                    <i class="fa-solid fa-plus me-1"></i> Agregar
                </button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive" style="max-height: 500px;">
                    <table class="table table-hover table-striped mb-0 text-nowrap">
                        <thead class="table-dark sticky-top">
                            <tr>
                                <th class="ps-3">Nombre</th>
                                <th>Teléfono</th>
                                <th>Email</th>
                                <th>Estatus</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyVendedores">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
