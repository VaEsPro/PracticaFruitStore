<div id="divFormProductos" class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex align-items-center justify-content-between">
                <h3>Detalle de Producto</h3>
                <button class="btn btn-outline-danger"> X </button>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-12">
                        <input id="txtIdProducto" readonly />
                    </div>
                </div>
                <div class="row">
                    <div class="col-3">
                        <div class="form-floating">
                            <input id="txtNomProducto" type="text" class="form-control" placeholder="Nombre del Producto:"/>
                            <label for="txtNomProducto" >Nombre del Producto:</label>
                        </div>
                    </div>
                    <div class="col-3">
                        <div class="form-floating">
                            <select id="cmbCategoria" class="form-select">
                                <option>Fruta</option>
                                <option>Verdura</option>
                                <option>Hortaliza</option>
                                <option>Legumbre</option>
                                <option>Cereal</option>
                                <option>Datil</option>
                            </select>
                            <label for="cmbCategoria" class="form-label">Categoria:</label>
                        </div>
                    </div>
                    <div class="col-3">
                        <div class="form-floating">
                            <input id="txtPrecio" type="text" class="form-control" placeholder="Precio:"/>
                            <label for="txtPrecio" class="form-label">Precio:</label>
                        </div>
                    </div>
                    <div class="col-3">
                        <div class="form-floating">
                            <input id="txtEstatus" type="text" class="form-control" placeholder="Estatus:"/>
                            <label for="txtEstatus" class="form-label">Estatus:</label>
                        </div>
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12 d-flex justify-content-center">
                        <button class="btn btn-outline-primary"> 💾 Guardar</button>
                        <button class="btn btn-outline-danger ms-2"> 🗑️ Eliminar</button>
                        <button class="btn btn-outline-success ms-2"> 📦 Nuevo</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="divTablaProductos" class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex align-items-center justify-content-between">
                <h3>Catalogo de Productos</h3>
                <button class="btn btn-outline-success"> + Agregar</button>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Categoria</th>
                            <th>Precio</th>
                            <th>Estatus</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tbodyProductos">

                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
