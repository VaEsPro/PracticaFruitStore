<div id="divFormProductos" class="row mb-4">
    <div class="col-12">
        <div class="card card-custom">
            <div class="card-header card-header-custom d-flex align-items-center justify-content-between">
                <h5 class="mb-0"><i class="fa-solid fa-file-signature text-primary me-2"></i>Detalle de Producto</h5>
                <button class="btn btn-outline-danger btn-sm fw-bold" onclick="cm.cerrarDetalle();">
                    <i class="fa-solid fa-xmark"></i> Cerrar
                </button>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-2 col-12">
                        <label for="txtIdProducto" class="form-label fw-bold">ID Producto:</label>
                        <input id="txtIdProducto" class="form-control bg-light" readonly />
                    </div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-4 col-12">
                        <div class="form-floating">
                            <input id="txtNomProducto" type="text" class="form-control" placeholder="Nombre del Producto:"/>
                            <label for="txtNomProducto">Nombre del Producto:</label>
                        </div>
                    </div>
                    <div class="col-md-4 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <select id="cmbCategoria" class="form-select">
                                <option value="0">Seleccione una categoría...</option>
                            </select>
                            <label for="cmbCategoria">Categoría:</label>
                        </div>
                    </div>
                    <div class="col-md-4 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtExistencias" type="number" class="form-control" placeholder="Existencias:"/>
                            <label for="txtExistencias">Existencias:</label>
                        </div>
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-4 col-12">
                        <div class="form-floating">
                            <input id="txtPrecioCompra" type="number" step="0.01" class="form-control" placeholder="Precio Compra:"/>
                            <label for="txtPrecioCompra">Precio Compra ($):</label>
                        </div>
                    </div>
                    <div class="col-md-4 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtPrecioVenta" type="number" step="0.01" class="form-control" placeholder="Precio Venta:"/>
                            <label for="txtPrecioVenta">Precio Venta ($):</label>
                        </div>
                    </div>
                    <div class="col-md-4 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtEstatus" type="number" class="form-control" placeholder="Estatus"/>
                            <label for="txtEstatus">Estatus (1 o 0):</label>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-12 d-flex justify-content-center gap-2">
                        <button class="btn btn-primary px-4" onclick="cm.save();">
                            <i class="fa-solid fa-floppy-disk me-1"></i> Guardar
                        </button>
                        <button class="btn btn-danger px-4" onclick="cm.deletE();">
                            <i class="fa-solid fa-trash me-1"></i> Eliminar
                        </button>
                        <button class="btn btn-success px-4" onclick="cm.limpiarFormulario();">
                            <i class="fa-solid fa-file-circle-plus me-1"></i> Nuevo
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="divTablaProductos" class="row">
    <div class="col-12">
        <div class="card card-custom">
            <div class="card-header card-header-custom d-flex align-items-center justify-content-between">
                <h5 class="mb-0"><i class="fa-solid fa-list text-primary me-2"></i>Catálogo de Productos</h5>
                <button class="btn btn-success btn-sm" onclick="cm.setDetalleVisible(true); cm.limpiarFormulario();">
                    <i class="fa-solid fa-plus me-1"></i> Agregar
                </button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0 text-nowrap">
                        <thead class="table-dark">
                            <tr>
                                <th class="ps-3">Nombre</th>
                                <th>Categoría</th>
                                <th>Precio Compra</th>
                                <th>Precio Venta</th>
                                <th>Existencia</th>
                                <th>Estatus</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyProductos">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
