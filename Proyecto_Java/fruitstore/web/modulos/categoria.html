<div id="divFormCategorias" class="row mb-4">
    <div class="col-12">
        <div class="card card-custom">
            <div class="card-header card-header-custom d-flex align-items-center justify-content-between">
                <h5 class="mb-0"><i class="fa-solid fa-tag text-primary me-2"></i>Detalle de Categoría</h5>
                <button class="btn btn-outline-danger btn-sm fw-bold" onclick="cm.cerrarDetalle();">
                    <i class="fa-solid fa-xmark"></i> Cerrar
                </button>
            </div>
            <div class="card-body">
                <div class="row mb-4">
                    <div class="col-md-2 col-12 mb-3 mb-md-0">
                        <div class="form-floating">
                            <input id="txtIdCategoria" class="form-control bg-light" readonly placeholder="ID"/>
                            <label for="txtIdCategoria" class="fw-bold">ID:</label>
                        </div>
                    </div>
                    
                    <div class="col-md-6 col-12 mb-3 mb-md-0">
                        <div class="form-floating">
                            <input id="txtNomCategoria" type="text" class="form-control" placeholder="Nombre de la Categoría"/>
                            <label for="txtNomCategoria">Nombre de la Categoría:</label>
                        </div>
                    </div>
                    
                    <div class="col-md-4 col-12">
                        <div class="form-floating">
                            <input id="txtStatus" type="number" class="form-control" placeholder="Estatus"/>
                            <label for="txtStatus">Estatus (1 Activo, 0 Inactivo):</label>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-12 d-flex justify-content-center gap-2">
                        <button class="btn btn-primary px-4" onclick="cm.save();">
                            <i class="fa-solid fa-floppy-disk me-1"></i> Guardar
                        </button>
                        <button class="btn btn-danger px-4" onclick="cm.deletE();">
                            <i class="fa-solid fa-trash me-1"></i> Eliminar
                        </button>
                        <button class="btn btn-success px-4" onclick="cm.limpiarFormulario();">
                            <i class="fa-solid fa-file-circle-plus me-1"></i> Nuevo
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="divTablaCategorias" class="row">
    <div class="col-12">
        <div class="card card-custom">
            <div class="card-header card-header-custom d-flex align-items-center justify-content-between">
                <h5 class="mb-0"><i class="fa-solid fa-list text-primary me-2"></i>Catálogo de Categorías</h5>
                <button class="btn btn-success btn-sm" onclick="cm.setDetalleVisible(true); cm.limpiarFormulario();">
                    <i class="fa-solid fa-plus me-1"></i> Agregar
                </button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th class="ps-3" style="width: 15%;">ID</th>
                                <th>Nombre</th>
                                <th>Estatus</th>
                                <th class="text-center" style="width: 15%;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyCategorias">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
