<div id="divDetalleProveedor" class="row mb-4">
    <div class="col-12">
        <div class="card card-custom">
            <div class="card-header card-header-custom d-flex align-items-center justify-content-between">
                <h5 class="mb-0"><i class="fa-solid fa-truck text-primary me-2"></i>Detalle de Proveedor</h5>
                <button class="btn btn-outline-danger btn-sm fw-bold" onclick="cm.cerrarDetalle();">
                    <i class="fa-solid fa-xmark"></i> Cerrar
                </button>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-2 col-12">
                        <div class="form-floating">
                            <input id="txtIdProveedor" type="text" class="form-control bg-light" placeholder="ID" readonly />
                            <label for="txtIdProveedor" class="fw-bold">ID:</label>
                        </div>
                    </div>
                    <div class="col-md-5 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtNombre" type="text" class="form-control" placeholder="Nombre"/>
                            <label for="txtNombre">Nombre del Proveedor:</label>
                        </div>
                    </div>
                    <div class="col-md-5 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtRFC" type="text" class="form-control" placeholder="RFC"/>
                            <label for="txtRFC">RFC:</label>
                        </div>
                    </div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6 col-12">
                        <div class="form-floating">
                            <input id="txtRazonSocial" type="text" class="form-control" placeholder="Razón Social"/>
                            <label for="txtRazonSocial">Razón Social:</label>
                        </div>
                    </div>
                    <div class="col-md-6 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtDireccion" type="text" class="form-control" placeholder="Dirección"/>
                            <label for="txtDireccion">Dirección Completa:</label>
                        </div>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-4 col-12">
                        <div class="form-floating">
                            <input id="txtEmail" type="email" class="form-control" placeholder="Email"/>
                            <label for="txtEmail">Correo Electrónico:</label>
                        </div>
                    </div>
                    <div class="col-md-3 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtTelFijo" type="text" class="form-control" placeholder="Teléfono Fijo"/>
                            <label for="txtTelFijo">Teléfono Fijo:</label>
                        </div>
                    </div>
                    <div class="col-md-3 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtTelMovil" type="text" class="form-control" placeholder="Teléfono Móvil"/>
                            <label for="txtTelMovil">Teléfono Móvil:</label>
                        </div>
                    </div>
                    <div class="col-md-2 col-12 mt-3 mt-md-0">
                        <div class="form-floating">
                            <input id="txtEstatus" type="number" class="form-control" placeholder="Estatus"/>
                            <label for="txtEstatus">Estatus (1 o 0):</label>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12 d-flex justify-content-center gap-2">
                        <button class="btn btn-primary px-4" onclick="cm.save();">
                            <i class="fa-solid fa-floppy-disk me-1"></i> Guardar
                        </button>
                        <button class="btn btn-danger px-4" onclick="cm.deletE();">
                            <i class="fa-solid fa-trash me-1"></i> Eliminar
                        </button>
                        <button class="btn btn-success px-4" onclick="cm.limpiarFormulario();">
                            <i class="fa-solid fa-file-circle-plus me-1"></i> Nuevo
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="divCatalogoProveedores" class="row">
    <div class="col-12">
        <div class="card card-custom">
            <div class="card-header card-header-custom d-flex align-items-center justify-content-between">
                <h5 class="mb-0"><i class="fa-solid fa-boxes-packing text-primary me-2"></i>Catálogo de Proveedores</h5>
                <button class="btn btn-success btn-sm" onclick="cm.setDetalleVisible(true); cm.limpiarFormulario();">
                    <i class="fa-solid fa-plus me-1"></i> Agregar
                </button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th class="ps-3">Nombre</th>
                                <th>RFC</th>
                                <th>Tel. Móvil</th>
                                <th>Estatus</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyProveedores">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
